server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 ipv6=off valid=30s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /probe/mscl {
        set $upstream "mscl-collector:5000";
        proxy_pass http://$upstream/api/health;
    }

    location = /probe/influx {
        set $upstream "influxdb:8086";
        proxy_pass http://$upstream/health;
    }

    location = /probe/grafana {
        set $upstream "grafana:3000";
        proxy_pass http://$upstream/api/health;
    }

    location = /probe/grafapp {
        set $upstream "graf-lite:3010";
        proxy_pass http://$upstream/api/health;
    }

    location = /probe/ap {
        proxy_pass http://host.docker.internal:3070/health;
    }

    location = /probe/redlab {
        set $upstream "redlab-collector:8090";
        proxy_pass http://$upstream/health;
    }

    location = /probe/almemo {
        set $upstream "almemo-collector:3040";
        proxy_pass http://$upstream/health;
    }

    location = /probe/optris {
        set $upstream "pyrometer-collector:3050";
        proxy_pass http://$upstream/api/device/optris/health;
    }

    location = /probe/pyrometer {
        set $upstream "pyrometer-collector:3050";
        proxy_pass http://$upstream/health;
    }

    location = /probe/matterapp {
        set $upstream "matter-collector:3060";
        proxy_pass http://$upstream/health;
    }

    location = /probe/messkluppe {
        set $upstream "messkluppe-collector:3080";
        proxy_pass http://$upstream/health;
    }

    location = /probe/svcctl {
        proxy_pass http://host.docker.internal:3020/health;
    }

    location = /probe/host {
        proxy_pass http://host.docker.internal:3020/host-metrics;
    }

    location /api/control/ {
        rewrite ^/api/control/(.*)$ /$1 break;
        proxy_pass http://host.docker.internal:3020;
    }

    location = /api/node {
        proxy_pass http://host.docker.internal:8081/api/node;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
    }

    location = /api/devices {
        proxy_pass http://host.docker.internal:8081/api/devices;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
    }

    location = /api/diagnostics {
        proxy_pass http://host.docker.internal:8081/api/diagnostics;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
    }

    location = /api/actions {
        proxy_pass http://host.docker.internal:8081/api/actions;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
    }

    location /api/actions/ {
        proxy_pass http://host.docker.internal:8081;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
    }

    location = /mscl {
        return 301 /mscl/;
    }

    location /mscl/ {
        set $upstream "mscl-collector:5000";
        rewrite ^/mscl/(.*)$ /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$upstream;
    }

    location = /redlab {
        return 301 /redlab/;
    }

    location /redlab/ {
        set $upstream "redlab-collector:8090";
        rewrite ^/redlab/(.*)$ /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$upstream;
    }

    location = /almemo {
        return 301 /almemo/;
    }

    location /almemo/ {
        set $upstream "almemo-collector:3040";
        rewrite ^/almemo/(.*)$ /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$upstream;
    }

    location = /pyrometer {
        return 301 /pyrometer/;
    }

    location /pyrometer/ {
        set $upstream "pyrometer-collector:3050";
        rewrite ^/pyrometer/(.*)$ /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$upstream;
    }

    location = /matter {
        return 301 /matter/;
    }

    location /matter/ {
        client_max_body_size 64m;
        set $upstream "matter-collector:3060";
        rewrite ^/matter/(.*)$ /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$upstream;
    }

    location = /messkluppe {
        return 301 /messkluppe/;
    }

    location /messkluppe/ {
        set $upstream "messkluppe-collector:3080";
        rewrite ^/messkluppe/(.*)$ /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$upstream;
    }

    location = /probe/otbr {
        proxy_pass http://host.docker.internal:8080/;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
    }

    location = /probe/matter-server {
        proxy_pass http://host.docker.internal:5580/;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
    }

    location = /matter-server {
        return 301 /matter-server/;
    }

    location /matter-server/ {
        rewrite ^/matter-server/(.*)$ /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://host.docker.internal:5580;
    }

    location = /otbr {
        return 301 /otbr/;
    }

    location /otbr/ {
        rewrite ^/otbr/(.*)$ /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://host.docker.internal:8080;
    }

    location = /optris {
        return 301 /pyrometer/;
    }

    location /optris/ {
        return 301 /pyrometer/;
    }

    location = /graf {
        return 301 /graf/;
    }

    location /graf/ {
        set $upstream "graf-lite:3010";
        rewrite ^/graf/(.*)$ /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        proxy_pass http://$upstream;
    }

    location = /ap {
        return 301 /ap/;
    }

    location /ap/ {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        rewrite ^/ap/(.*)$ /$1 break;
        proxy_pass http://host.docker.internal:3070;
    }

    location = /grafana {
        return 301 /grafana/;
    }

    location /grafana/api/live/ {
        set $upstream "grafana:3000";
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$upstream;
    }

    location /grafana/ {
        set $upstream "grafana:3000";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$upstream;
    }

}
